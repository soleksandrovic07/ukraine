<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Калькулятор продукции</title>
<style>
*{box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f2f2f0;max-width:1100px;margin:auto;padding:20px}
.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:18px}
.header img{height:34px;width:auto;justify-self:start}
#title{margin:0;font-weight:500;color:#1e1e1e;text-align:center;justify-self:center;font-size:28px}
.lang-switch{justify-self:end;display:flex;gap:4px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:4px}
.lang-btn{border:none;background:transparent;padding:6px 14px;border-radius:7px;font-size:13px;font-weight:700;color:#888;cursor:pointer;letter-spacing:.5px}
.lang-btn.active{background:#6c5ce7;color:#fff}
@media (max-width:640px){
  .header{grid-template-columns:1fr;justify-items:center;text-align:center}
  .header img{justify-self:center}
  .lang-switch{justify-self:center}
}
.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px 22px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.03)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;align-items:end}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:4px}
select,input{width:100%;padding:11px 12px;border:1px solid #ccc;border-radius:10px;font-size:15px;background:#fafafa}
select:focus,input:focus{border-color:#6c5ce7;outline:none;background:#fff}
.result{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.metric{background:#f0effb;border-radius:14px;padding:18px 22px}
.metric div:first-child{font-size:14px;color:#444}
.big{font-size:clamp(16px,5.5vw,34px);font-weight:700;color:#2d2b4e;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 6px;border-bottom:1px solid #eee;text-align:left}
th{font-weight:600;color:#555}
.small{color:#666;font-size:13px;margin-top:6px}
.gray{color:#888;font-style:italic}
</style>
</head>

function getStep(map, qty) {
  const keys = Object.keys(map).map(Number).sort((a,b)=>a-b);
  let step = keys[0];
  keys.forEach(k => { if (k <= qty) step = k; });
  return step;
}

function fillTable(map) {
  const tbody = document.getElementById('tbody');

  Object.entries(map).forEach(([k,v]) => {
    tbody.innerHTML += `<tr><td>${k}</td><td>${v} грн</td></tr>`;
  });
}

  hint.textContent = message;
  tbody.innerHTML = `<tr><td colspan="2" style="text-align:center;color:#888;padding:20px;">${message}</td></tr>`;

  if (current) p.value = current;
}

function buildControls() {
  const type = p.value;
  let html = '';
  if (type === 'badges' || type === 'keychains') {
    const isBadge = type === 'badges';
    let enamelOptions = '';
    for (let i = 1; i <= 10; i++) {
      enamelOptions += `<option value="${i}" ${i === 3 ? 'selected' : ''}>${i}</option>`;
    }
    html = `<div class="grid">
      ${isBadge ? `<div><label>${t('sizeLabel')}</label><select id="size"><option value="3">до 3 см²</option><option value="6">до 6 см²</option><option value="9" selected>до 9 см²</option></select></div>` : ''}
      ${!isBadge ? `<div><label>${t('sideLabel')}</label><select id="side"><option value="one">${t('oneSide')}</option><option value="two">${t('twoSide')}</option></select></div>` : ''}
      ${!isBadge ? `<div><label>${t('sizeLabel')}</label><select id="size"><option value="6">до 6 см²</option><option value="9" selected>до 9 см²</option><option value="15">до 15 см²</option><option value="20">до 20 см²</option></select></div>` : ''}
      <div><label>${t('coatLabel')}</label><select id="coat"><option value="nickel">${t('nickelOption')}</option><option value="gold">${t('goldOption')}</option></select></div>
      <div><label>${t('enamelLabel')}</label><select id="enamel">${enamelOptions}</select></div>
      <div><label>${t('qtyLabel')}</label><input id="qty" type="number" value="${isBadge ? 150 : 300}"></div>
    </div>`;
  } else if (type === 'poly') {
    html = `<div class="grid">
      <div><label>${t('diameterLabel')}</label><select id="size"><option value="36">36 мм</option><option value="43" selected>43 мм</option><option value="56">56 мм</option></select></div>
      <div><label>${t('qtyLabel')}</label><input id="qty" type="number" value="1000"></div>
    </div>`;
  } else if (type === 'diplomas') {
    html = `<div class="grid">
      <div><label>${t('sizeLabel')}</label><select id="size"><option value="A4" selected>А4 (300x220 мм)</option><option value="A5">А5 (200x150 мм)</option></select></div>
      <div><label>${t('qtyLabel')}</label><input id="qty" type="number" value="50"></div>
    </div>`;
  } else {
    html = `<div class="grid"><div><label>${t('qtyLabel')}</label><input id="qty" type="number" value="100"></div></div>`;
  }
  document.getElementById('controls').innerHTML = html;
  document.querySelectorAll('#controls input, #controls select').forEach(el => {
    el.addEventListener('input', calc);
  });
  calc();
}

// ---- ОСНОВНОЙ РАСЧЁТ ----
function calc() {
  const tbody = document.getElementById('tbody');
  const unit = document.getElementById('unit');
  const total = document.getElementById('total');
  const hint = document.getElementById('hint');
  tbody.innerHTML = ''; hint.textContent = '';
  const type = p.value;

  try {
    if (type === 'badges') {
      const size = document.getElementById('size').value;
      const coat = document.getElementById('coat').value;
      const enamel = parseInt(document.getElementById('enamel').value) || 3;
      const qty = +document.getElementById('qty').value || 0;
      
      if (qty > 1000) {
        showIndividualPrice(t('indivBadge'));
        return;
      }
      
      const extraEnamel = Math.max(0, enamel - 3) * 4.80;
      const map = badges[size][coat];
      const step = getStep(map, qty);
      const basePrice = map[step];
      const price = basePrice + extraEnamel;
      unit.textContent = price.toFixed(2) + ' грн';
      total.textContent = (price * qty).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '\u00A0') + ' грн';
      hint.textContent = t('hintBadgeKeychain')(step, enamel);
      fillTable(map);
      tbody.innerHTML += `<tr style="background:#fff3cd;"><td colspan="2" style="text-align:center;color:#856404;padding:8px;">${t('indivBadgeRow')}</td></tr>`;
    }
    else if (type === 'keychains') {
      const side = document.getElementById('side').value;
      const size = document.getElementById('size').value;
      const coat = document.getElementById('coat').value;
      const enamel = parseInt(document.getElementById('enamel').value) || 3;
      const qty = +document.getElementById('qty').value || 0;
      
      if (qty > 300) {
        showIndividualPrice(t('indivKeychain'));
        return;
      }
      
      const extraEnamel = Math.max(0, enamel - 3) * 4.80;
      const map = keychains[side][size][coat];
      const step = getStep(map, qty);
      const basePrice = map[step];
      const price = basePrice + extraEnamel;
      unit.textContent = price.toFixed(2) + ' грн';
      total.textContent = (price * qty).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '\u00A0') + ' грн';
      hint.textContent = t('hintBadgeKeychain')(step, enamel);
      fillTable(map);
      tbody.innerHTML += `<tr style="background:#fff3cd;"><td colspan="2" style="text-align:center;color:#856404;padding:8px;">${t('indivKeychainRow')}</td></tr>`;
    }
    else if (type === 'diplomas') {
      const size = document.getElementById('size').value;
      const map = diplomas[size];
      const qty = +document.getElementById('qty').value || 0;
      
      if (qty > 200) {
        showIndividualPrice(t('indivDiploma'));
        return;
      }
      
      const step = getStep(map, qty);
      const price = map[step];
      unit.textContent = price + ' грн';
      total.textContent = (price * qty).toLocaleString(locale()) + ' грн';
      hint.textContent = t('hintDiploma')(step);
      fillTable(map);
      tbody.innerHTML += `<tr style="background:#fff3cd;"><td colspan="2" style="text-align:center;color:#856404;padding:8px;">${t('indivDiplomaRow')}</td></tr>`;
    }
    else if (type === 'poly') {
      const size = document.getElementById('size').value;
      const map = polyPrices[size];
      const qty = +document.getElementById('qty').value || 0;
      
      if (qty > 25000) {
        showIndividualPrice(t('indivPoly'));
        return;
      }
      
      const step = getStep(map, qty);
      const price = map[step];
      unit.textContent = price + ' грн';
      total.textContent = (price * qty).toLocaleString(locale()) + ' грн';
      hint.textContent = t('hintPoly')(step);
      fillTable(map);
      tbody.innerHTML += `<tr style="background:#fff3cd;"><td colspan="2" style="text-align:center;color:#856404;padding:8px;">${t('indivPolyRow')}</td></tr>`;
    }
    else if (type === 'pvc') {
      const qty = +document.getElementById('qty').value || 0;
      let minPrice, maxPrice;
      if (qty >= 50) {
        minPrice = 295;
        maxPrice = 310;
      } else {
        minPrice = 320;
        maxPrice = 350;
      }
      unit.textContent = minPrice + '-' + maxPrice + ' грн';
      total.textContent = (minPrice * qty).toLocaleString(locale()) + ' - ' + (maxPrice * qty).toLocaleString(locale()) + ' грн';
      hint.textContent = t('pvcHint');
      tbody.innerHTML = `<tr><td>20</td><td>320-350 грн</td></tr>
                         <tr><td>50+</td><td>295-310 грн</td></tr>`;
    }
    else {
      const map = simple[type];
      const qty = +document.getElementById('qty').value || 0;
      const step = getStep(map, qty);
      const price = map[step];
      unit.textContent = price + ' грн';
      total.textContent = (price * qty).toLocaleString(locale()) + ' грн';
      hint.textContent = t('hintSimple')(step);
      fillTable(map);
    }
  } catch (e) {
    unit.textContent = '-';
    total.textContent = '-';
    hint.textContent = t('error');
    console.warn(e);
  }
}

function applyLanguage(newLang) {
  lang = newLang;
  document.documentElement.lang = (lang === 'ua') ? 'uk' : 'ru';
  document.title = t('title');
  document.getElementById('title').textContent = t('title');
  document.getElementById('label-product').textContent = t('productLabel');
  document.getElementById('label-unit').textContent = t('unitLabel');
  document.getElementById('label-total').textContent = t('totalLabel');
  document.getElementById('th-qty').textContent = t('thQty');
  document.getElementById('th-price').textContent = t('thPrice');
  document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
  document.getElementById('lang-ua').classList.toggle('active', lang === 'ua');
  populateProducts();
  buildControls();
}

document.getElementById('lang-ru').addEventListener('click', () => applyLanguage('ru'));
document.getElementById('lang-ua').addEventListener('click', () => applyLanguage('ua'));

p.addEventListener('change', buildControls);
populateProducts();
p.value = 'badges';
applyLanguage('ru');

</script>
